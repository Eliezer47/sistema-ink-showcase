name: Public safety

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify public boundaries
        run: pnpm check:public
      - name: Build and test
        run: pnpm test
